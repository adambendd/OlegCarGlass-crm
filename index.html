<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OlegCarGlass — CRM</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪟</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
:root {
  --bg: #080808;
  --surface: #0f0f0f;
  --surface2: #161616;
  --border: #1f1f1f;
  --border2: #2a2a2a;
  --gold: #e8b84b;
  --gold2: #f5cc6e;
  --gold-dim: #e8b84b18;
  --text: #f2ede4;
  --text2: #8a8278;
  --text3: #3d3a35;
  --green: #5a9e72;
  --red: #9e5a5a;
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }

/* Ambient bg glow */
body::before {
content: ‘’;
position: fixed; top: -40vh; left: -20vw;
width: 80vw; height: 80vh;
background: radial-gradient(ellipse, #e8b84b0a 0%, transparent 70%);
pointer-events: none; z-index: 0;
}

/* Animations */
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shimmer { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
@keyframes spin { to { transform: rotate(360deg); } }
.fade { animation: fadeUp 0.5s cubic-bezier(.16,1,.3,1) both; }
.fade-d1 { animation-delay: .05s; }
.fade-d2 { animation-delay: .1s; }
.fade-d3 { animation-delay: .15s; }

/* Scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(–border2); border-radius: 4px; }

/* Inputs */
input, textarea, select {
width: 100%; padding: 12px 16px;
background: var(–surface2); border: 1px solid var(–border);
border-radius: 12px; color: var(–text); font-size: 14px;
font-family: var(–font-body); outline: none;
transition: border-color 0.2s, box-shadow 0.2s;
-webkit-appearance: none;
}
input:focus, textarea:focus, select:focus {
border-color: #e8b84b55;
box-shadow: 0 0 0 3px #e8b84b0d;
}
input::placeholder, textarea::placeholder { color: var(–text3); }
select option { background: var(–surface2); }
textarea { resize: vertical; line-height: 1.6; }

/* Buttons */
.btn-primary {
background: var(–gold); color: #080808;
border: none; padding: 13px 24px; border-radius: 12px;
font-weight: 600; font-size: 14px; cursor: pointer;
font-family: var(–font-body); width: 100%;
transition: all 0.2s cubic-bezier(.16,1,.3,1);
letter-spacing: 0.2px; position: relative; overflow: hidden;
}
.btn-primary::after {
content: ‘’; position: absolute; inset: 0;
background: linear-gradient(135deg, #fff2 0%, transparent 60%);
opacity: 0; transition: opacity 0.2s;
}
.btn-primary:hover:not(:disabled)::after { opacity: 1; }
.btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 32px #e8b84b2a; }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

.btn-ghost {
background: transparent; color: var(–text2);
border: 1px solid var(–border); padding: 11px 18px;
border-radius: 12px; font-size: 13px; cursor: pointer;
font-family: var(–font-body); transition: all 0.18s;
}
.btn-ghost:hover { border-color: var(–border2); color: var(–text); }

.btn-icon {
background: none; border: none; color: var(–text3);
cursor: pointer; padding: 5px; border-radius: 7px;
font-size: 13px; transition: all 0.15s; line-height: 1;
display: flex; align-items: center; justify-content: center;
}
.btn-icon:hover { color: var(–red); background: #9e5a5a12; }

.btn-add {
background: transparent; color: var(–text3);
border: 1px dashed var(–border); padding: 10px;
border-radius: 12px; font-size: 13px; cursor: pointer;
font-family: var(–font-body); width: 100%; margin-top: 8px;
transition: all 0.18s;
}
.btn-add:hover { color: var(–gold); border-color: #e8b84b44; background: var(–gold-dim); }

/* Nav */
.nav {
height: 62px; border-bottom: 1px solid var(–border);
display: flex; align-items: center; padding: 0 28px; gap: 8px;
background: #08080899; backdrop-filter: blur(20px);
position: sticky; top: 0; z-index: 100;
}
.nav-logo {
display: flex; align-items: center; gap: 11px; margin-right: 12px; text-decoration: none;
}
.nav-logo-icon {
width: 32px; height: 32px; background: var(–gold);
border-radius: 9px; display: flex; align-items: center;
justify-content: center; font-size: 16px; flex-shrink: 0;
box-shadow: 0 4px 14px #e8b84b28;
}
.nav-logo-text { font-family: var(–font-display); font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.nav-logo-sub { font-size: 9px; color: var(–text3); letter-spacing: 1.5px; margin-top: 1px; }

.nav-tab {
background: none; border: none; cursor: pointer;
font-family: var(–font-body); font-size: 13px; font-weight: 500;
padding: 7px 14px; color: var(–text2); border-radius: 9px;
transition: all 0.18s; position: relative;
}
.nav-tab:hover { color: var(–text); background: var(–surface); }
.nav-tab.on { color: var(–text); background: var(–surface2); }
.nav-tab.on::after {
content: ‘’; position: absolute; bottom: -1px; left: 14px; right: 14px;
height: 1.5px; background: var(–gold); border-radius: 2px;
}

/* Layout */
.layout { display: flex; min-height: calc(100vh - 62px); position: relative; z-index: 1; }

/* Main */
.main { flex: 1; padding: 40px 44px 80px; min-width: 0; }

/* Section header */
.section-title {
font-family: var(–font-display); font-size: 26px;
font-weight: 700; letter-spacing: -0.5px; color: var(–text);
margin-bottom: 4px;
}
.section-sub { font-size: 13px; color: var(–text3); margin-bottom: 32px; }

/* Empty state */
.empty {
border: 1px dashed var(–border); border-radius: 18px;
padding: 80px 32px; text-align: center;
}
.empty-icon { font-size: 36px; opacity: 0.15; margin-bottom: 14px; }
.empty-text { font-size: 14px; color: var(–text3); }

/* Form card */
.form-card {
background: var(–surface); border: 1px solid var(–border);
border-radius: 18px; padding: 26px; max-width: 540px;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
.field { margin-bottom: 16px; }
.field.full { grid-column: span 2; }
.field-label {
font-size: 11px; color: var(–text2); letter-spacing: 0.6px;
margin-bottom: 7px; text-transform: uppercase; font-weight: 500;
}

/* Receipt preview */
.preview-card {
background: var(–surface); border: 1px solid var(–border);
border-radius: 18px; padding: 24px; margin-top: 20px; max-width: 540px;
}
.preview-header {
display: flex; justify-content: space-between; align-items: center;
margin-bottom: 16px; padding-bottom: 14px;
border-bottom: 1px solid var(–border);
}
.preview-label { font-size: 10px; color: var(–text3); letter-spacing: 1.2px; font-weight: 600; }
.preview-actions { display: flex; gap: 8px; }
.preview-body {
font-family: var(–font-body); font-size: 13px; color: var(–text2);
line-height: 1.8; white-space: pre-wrap;
}

/* Biz sidebar */
.sidebar {
width: 272px; border-left: 1px solid var(–border);
background: #0a0a0a; padding: 28px 16px;
height: calc(100vh - 62px); position: sticky; top: 62px;
overflow-y: auto; flex-shrink: 0;
}
.sidebar-label {
font-size: 10px; color: var(–text3); letter-spacing: 1.4px;
margin-bottom: 12px; padding: 0 4px; font-weight: 600;
}
.biz-list { display: flex; flex-direction: column; gap: 4px; }
.biz-item {
padding: 11px 13px; border-radius: 12px;
border: 1px solid transparent; cursor: pointer;
transition: all 0.18s cubic-bezier(.16,1,.3,1);
display: flex; align-items: center; gap: 10px;
}
.biz-item:hover { background: var(–surface); border-color: var(–border); }
.biz-item.active { background: #1a1810; border-color: #e8b84b33; }
.biz-avatar {
width: 30px; height: 30px; border-radius: 8px;
background: var(–surface2); display: flex; align-items: center;
justify-content: center; font-size: 13px; flex-shrink: 0;
transition: background 0.18s;
}
.biz-item.active .biz-avatar { background: #272010; }
.biz-name {
font-size: 13px; font-weight: 500; color: var(–text2);
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
transition: color 0.18s; flex: 1;
}
.biz-item.active .biz-name { color: var(–text); }
.biz-email { font-size: 11px; color: var(–text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Add biz form */
.add-biz-form {
margin-top: 12px; background: var(–surface);
border: 1px solid var(–border); border-radius: 14px; padding: 14px;
}
.add-biz-form input { margin-bottom: 8px; font-size: 13px; padding: 10px 13px; border-radius: 9px; }
.add-biz-actions { display: flex; gap: 6px; margin-top: 4px; }

/* Job items */
.job-item {
display: flex; align-items: center; gap: 14px;
padding: 14px 18px; background: var(–surface);
border: 1px solid var(–border); border-radius: 14px;
margin-bottom: 7px; max-width: 540px;
transition: border-color 0.18s;
}
.job-item:hover { border-color: var(–border2); }
.job-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.job-info { flex: 1; min-width: 0; }
.job-name { font-size: 14px; font-weight: 500; }
.job-meta { font-size: 11px; color: var(–text3); margin-top: 2px; }
.job-badge {
font-size: 10px; padding: 3px 9px; border-radius: 20px;
font-weight: 500; letter-spacing: 0.3px;
}
.job-amount { font-family: var(–font-display); font-size: 15px; font-weight: 700; }

/* Stat cards */
.stat-grid { display: flex; gap: 12px; margin-bottom: 32px; max-width: 540px; }
.stat-card {
flex: 1; background: var(–surface); border: 1px solid var(–border);
border-radius: 16px; padding: 18px 20px;
}
.stat-label { font-size: 10px; color: var(–text3); letter-spacing: 1px; margin-bottom: 10px; font-weight: 600; }
.stat-value { font-family: var(–font-display); font-size: 22px; font-weight: 700; }

/* Spinner */
.spinner {
width: 14px; height: 14px; border: 2px solid #08080840;
border-top-color: #080808; border-radius: 50%;
animation: spin 0.7s linear infinite; display: inline-block;
vertical-align: middle; margin-right: 8px;
}

/* Toast */
.toast {
position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
padding: 11px 22px; border-radius: 12px; font-size: 13px; font-weight: 500;
z-index: 9999; white-space: nowrap; backdrop-filter: blur(20px);
animation: fadeUp 0.3s cubic-bezier(.16,1,.3,1) both;
box-shadow: 0 8px 40px #00000060;
}

/* Selected biz bar */
.biz-bar {
display: flex; align-items: center; gap: 12px;
padding: 12px 16px; background: var(–surface);
border: 1px solid var(–border); border-radius: 14px;
margin-bottom: 24px; max-width: 540px;
}
.biz-bar-avatar {
width: 34px; height: 34px; background: #1e1c14;
border-radius: 9px; display: flex; align-items: center;
justify-content: center; font-size: 15px;
}
.biz-bar-name { font-size: 14px; font-weight: 600; }
.biz-bar-email { font-size: 12px; color: var(–text3); }
.biz-bar-change {
margin-left: auto; font-size: 12px; color: var(–gold);
background: none; border: none; cursor: pointer;
font-family: var(–font-body); padding: 5px 10px;
border-radius: 7px; transition: background 0.15s;
}
.biz-bar-change:hover { background: var(–gold-dim); }
</style>

</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

const INIT_BIZ = [
{ id: 1, name: “SafeLite AutoGlass”, email: “orders@safelite.com”, phone: “800-638-8958” },
{ id: 2, name: “Harmon AutoGlass”, email: “contact@harmonag.com”, phone: “800-726-8464” },
{ id: 3, name: “Novus Glass”, email: “info@novusglass.com”, phone: “800-944-7732” },
{ id: 4, name: “Glass Doctor”, email: “service@glassdoctor.com”, phone: “800-913-9230” },
{ id: 5, name: “National Windshield”, email: “orders@nationalws.com”, phone: “888-200-4100” },
];

const fmt = v => $${Math.abs(Number(v)).toFixed(2)};
const today = new Date().toLocaleDateString(“en-US”, { weekday:“long”, month:“long”, day:“numeric” });

function Field({ label, children, full }) {
return (
<div className={field${full?" full":""}}>
<div className="field-label">{label}</div>
{children}
</div>
);
}

function App() {
const [biz, setBiz] = useState(INIT_BIZ);
const [sel, setSel] = useState(null);
const [tab, setTab] = useState(“receipt”);
const [addOpen, setAddOpen] = useState(false);
const [newB, setNewB] = useState({ name:””, email:””, phone:”” });
const [form, setForm] = useState({ service:””, amount:””, date:””, notes:””, msg:”” });
const [loading, setLoading] = useState(false);
const [preview, setPreview] = useState(null);
const [jobs, setJobs] = useState([]);
const [jf, setJf] = useState({ service:””, amount:””, date:””, type:“income”, status:“paid”, bizId:”” });
const [toast, setToast] = useState(null);

const ping = (msg, ok=true) => {
setToast({msg,ok});
setTimeout(()=>setToast(null), 3000);
};

const pickBiz = (b) => {
setSel(b); setPreview(null); setTab(“receipt”);
};

const generate = async () => {
if (!sel) return ping(“Select a business first”, false);
if (!form.service.trim() || !form.amount) return ping(“Service and amount required”, false);
setLoading(true); setPreview(null);
try {
const r = await fetch(“https://api.anthropic.com/v1/messages”, {
method:“POST”,
headers:{“Content-Type”:“application/json”},
body: JSON.stringify({
model:“claude-sonnet-4-20250514”, max_tokens:900,
messages:[{role:“user”, content:Write a professional, warm, concise email receipt from OlegCarGlass auto glass repair shop.\nTo: ${sel.name} (${sel.email})\nService: ${form.service}\nAmount: $${form.amount}\nDate: ${form.date||"today"}\nNotes: ${form.notes||"none"}\nMessage from Oleg: ${form.msg||"none"}\n\nFormat: First line must be "Subject: [subject]", blank line, then email body.\nTone: friendly, professional. Sign as: Oleg — OlegCarGlass}]
})
});
const d = await r.json();
if (d.error) return ping(“Error: “+d.error.message, false);
setPreview((d.content||[]).map(b=>b.text||””).join(”\n”));
} catch { ping(“Connection error. Try again.”, false); }
finally { setLoading(false); }
};

const openMail = () => {
if (!preview||!sel) return;
const lines = preview.split(”\n”);
const sub = (lines.find(l=>/^subject:/i.test(l.trim()))||””).replace(/^subject:\s*/i,””).trim();
const body = lines.filter(l=>!/^subject:/i.test(l.trim())).join(”\n”).trim();
window.open(mailto:${sel.email}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)});
ping(Opened email for ${sel.name} ✓);
};

const saveBiz = () => {
if (!newB.name.trim()) return ping(“Name required”, false);
setBiz(p=>[…p,{…newB,id:Date.now()}]);
setNewB({name:””,email:””,phone:””});
setAddOpen(false);
ping(${newB.name} added);
};

const deleteBiz = (id,e) => {
e.stopPropagation();
if (sel?.id===id) setSel(null);
setBiz(p=>p.filter(b=>b.id!==id));
};

const saveJob = () => {
if (!jf.service.trim()||!jf.amount) return ping(“Fill service and amount”, false);
setJobs(p=>[…p,{…jf,id:Date.now(),amount:parseFloat(jf.amount)}]);
setJf({service:””,amount:””,date:””,type:“income”,status:“paid”,bizId:””});
ping(“Job saved”);
};

const inc = jobs.filter(j=>j.type===“income”).reduce((s,j)=>s+j.amount,0);
const exp = jobs.filter(j=>j.type===“expense”).reduce((s,j)=>s+j.amount,0);

return (
<div>
{/* NAV */}
<nav className="nav">
<div className="nav-logo">
<div className="nav-logo-icon">🪟</div>
<div>
<div className="nav-logo-text">OlegCarGlass</div>
<div className="nav-logo-sub">AUTO GLASS CRM</div>
</div>
</div>
<div style={{display:“flex”,gap:“4px”,marginLeft:“8px”}}>
{[[“receipt”,“Receipts”],[“jobs”,“Jobs”],[“finances”,“Finances”]].map(([k,l])=>(
<button key={k} className={nav-tab${tab===k?" on":""}} onClick={()=>setTab(k)}>{l}</button>
))}
</div>
<div style={{marginLeft:“auto”,fontSize:“12px”,color:“var(–text3)”,fontWeight:300}}>{today}</div>
</nav>


  {/* LAYOUT */}
  <div className="layout">

    {/* MAIN */}
    <div className="main">

      {/* ── RECEIPTS ── */}
      {tab==="receipt" && (
        <div className="fade">
          <div className="section-title">Send a Receipt</div>
          <div className="section-sub">
            {sel ? `Ready to send to ${sel.name}` : "Select a business from the right panel to begin"}
          </div>

          {!sel ? (
            <div className="empty">
              <div className="empty-icon">✉️</div>
              <div className="empty-text">No business selected — pick one from the sidebar →</div>
            </div>
          ) : (
            <div>
              {/* Selected biz bar */}
              <div className="biz-bar fade">
                <div className="biz-bar-avatar">🏢</div>
                <div>
                  <div className="biz-bar-name">{sel.name}</div>
                  <div className="biz-bar-email">{sel.email}</div>
                </div>
                <button className="biz-bar-change" onClick={()=>setSel(null)}>Change</button>
              </div>

              <div className="form-card fade fade-d1">
                <div className="form-grid">
                  <Field label="Service / Work Done" full>
                    <input value={form.service} onChange={e=>setForm(p=>({...p,service:e.target.value}))} placeholder="e.g. Windshield replacement" />
                  </Field>
                  <Field label="Amount ($)">
                    <input type="number" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))} placeholder="0.00" />
                  </Field>
                  <Field label="Date">
                    <input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} />
                  </Field>
                  <Field label="Job Notes" full>
                    <textarea rows={2} value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="Part numbers, vehicle info, anything relevant…" />
                  </Field>
                  <Field label="Personal Message (optional)" full>
                    <textarea rows={2} value={form.msg} onChange={e=>setForm(p=>({...p,msg:e.target.value}))} placeholder="e.g. Thanks for the ongoing work, really appreciate it!" />
                  </Field>
                </div>
                <button className="btn-primary" onClick={generate} disabled={loading}>
                  {loading ? <><span className="spinner"/>Generating receipt…</> : "✦  Generate Receipt with AI"}
                </button>
              </div>

              {preview && (
                <div className="preview-card fade">
                  <div className="preview-header">
                    <span className="preview-label">EMAIL PREVIEW</span>
                    <div className="preview-actions">
                      <button className="btn-ghost" style={{padding:"7px 14px",fontSize:"12px"}} onClick={()=>setPreview(null)}>Discard</button>
                      <button className="btn-primary" style={{width:"auto",padding:"9px 20px",fontSize:"13px"}} onClick={openMail}>
                        Open in Mail →
                      </button>
                    </div>
                  </div>
                  <div className="preview-body">{preview}</div>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* ── JOBS ── */}
      {tab==="jobs" && (
        <div className="fade">
          <div className="section-title">Jobs</div>
          <div className="section-sub">Log income and expenses</div>

          <div className="form-card" style={{marginBottom:"24px"}}>
            <div style={{fontSize:"12px",color:"var(--text3)",marginBottom:"16px",fontWeight:500,letterSpacing:"0.3px"}}>NEW ENTRY</div>
            <div className="form-grid">
              <Field label="Service / Description" full>
                <input value={jf.service} onChange={e=>setJf(p=>({...p,service:e.target.value}))} placeholder="e.g. Windshield repair" />
              </Field>
              <Field label="Amount ($)">
                <input type="number" value={jf.amount} onChange={e=>setJf(p=>({...p,amount:e.target.value}))} placeholder="0.00" />
              </Field>
              <Field label="Date">
                <input type="date" value={jf.date} onChange={e=>setJf(p=>({...p,date:e.target.value}))} />
              </Field>
              <Field label="Type">
                <select value={jf.type} onChange={e=>setJf(p=>({...p,type:e.target.value}))}>
                  <option value="income">Income</option>
                  <option value="expense">Expense</option>
                </select>
              </Field>
              <Field label="Status">
                <select value={jf.status} onChange={e=>setJf(p=>({...p,status:e.target.value}))}>
                  <option value="paid">Paid</option>
                  <option value="pending">Pending</option>
                </select>
              </Field>
              <Field label="Business" full>
                <select value={jf.bizId} onChange={e=>setJf(p=>({...p,bizId:e.target.value}))}>
                  <option value="">— none —</option>
                  {biz.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
                </select>
              </Field>
            </div>
            <button className="btn-primary" onClick={saveJob}>Save Entry</button>
          </div>

          {jobs.length===0
            ? <div className="empty"><div className="empty-icon">📋</div><div className="empty-text">No jobs logged yet. Add your first entry above.</div></div>
            : jobs.slice().reverse().map(j=>{
                const b = biz.find(x=>x.id===parseInt(j.bizId));
                const isInc = j.type==="income";
                return (
                  <div key={j.id} className="job-item">
                    <div className="job-dot" style={{background:isInc?"var(--green)":"var(--red)"}}/>
                    <div className="job-info">
                      <div className="job-name">{j.service}</div>
                      <div className="job-meta">{b?.name||"—"}{j.date&&` · ${j.date}`}</div>
                    </div>
                    <span className="job-badge" style={{background:j.status==="paid"?"#5a9e7218":"#e8b84b18",color:j.status==="paid"?"var(--green)":"var(--gold)"}}>{j.status}</span>
                    <div className="job-amount" style={{color:isInc?"var(--green)":"var(--red)"}}>{isInc?"+":"−"}{fmt(j.amount)}</div>
                    <button className="btn-icon" onClick={()=>setJobs(p=>p.filter(x=>x.id!==j.id))}>✕</button>
                  </div>
                );
              })
          }
        </div>
      )}

      {/* ── FINANCES ── */}
      {tab==="finances" && (
        <div className="fade">
          <div className="section-title">Finances</div>
          <div className="section-sub">Your income and expense overview</div>

          {jobs.length===0
            ? <div className="empty"><div className="empty-icon">📊</div><div className="empty-text">Log jobs first — your financial summary appears here.</div></div>
            : <>
                <div className="stat-grid">
                  {[["INCOME",inc,"var(--green)"],["EXPENSES",exp,"var(--red)"],["NET PROFIT",inc-exp,inc-exp>=0?"var(--gold)":"var(--red)"]].map(([l,v,c])=>(
                    <div key={l} className="stat-card">
                      <div className="stat-label">{l}</div>
                      <div className="stat-value" style={{color:c}}>{fmt(v)}</div>
                    </div>
                  ))}
                </div>
                {jobs.slice().reverse().map(j=>(
                  <div key={j.id} style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 16px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"12px",marginBottom:"6px",maxWidth:"540px"}}>
                    <div style={{width:"5px",height:"5px",borderRadius:"50%",background:j.type==="income"?"var(--green)":"var(--red)",flexShrink:0}}/>
                    <div style={{flex:1,fontSize:"13px",fontWeight:500}}>{j.service}</div>
                    <div style={{fontSize:"11px",color:"var(--text3)"}}>{j.date}</div>
                    <div style={{fontSize:"13px",fontWeight:700,fontFamily:"var(--font-display)",color:j.type==="income"?"var(--green)":"var(--red)"}}>{j.type==="income"?"+":"−"}{fmt(j.amount)}</div>
                  </div>
                ))}
              </>
          }
        </div>
      )}
    </div>

    {/* SIDEBAR */}
    <div className="sidebar">
      <div className="sidebar-label">YOUR BUSINESSES</div>
      <div className="biz-list">
        {biz.map((b,i)=>(
          <div key={b.id} className={`biz-item${sel?.id===b.id?" active":""}`}
            onClick={()=>pickBiz(b)}
            style={{animationDelay:`${i*0.04}s`}}>
            <div className="biz-avatar">🏢</div>
            <div style={{overflow:"hidden",flex:1}}>
              <div className="biz-name">{b.name}</div>
              <div className="biz-email">{b.email||"—"}</div>
            </div>
            <button className="btn-icon" onClick={e=>deleteBiz(b.id,e)} style={{flexShrink:0}}>✕</button>
          </div>
        ))}
      </div>

      {addOpen ? (
        <div className="add-biz-form">
          <input value={newB.name} onChange={e=>setNewB(p=>({...p,name:e.target.value}))} placeholder="Business name *" />
          <input value={newB.email} onChange={e=>setNewB(p=>({...p,email:e.target.value}))} placeholder="Email address" />
          <input value={newB.phone} onChange={e=>setNewB(p=>({...p,phone:e.target.value}))} placeholder="Phone (optional)" style={{marginBottom:0}} />
          <div className="add-biz-actions">
            <button className="btn-primary" style={{padding:"9px",fontSize:"13px"}} onClick={saveBiz}>Save</button>
            <button className="btn-ghost" style={{flex:1,fontSize:"12px",padding:"8px"}} onClick={()=>setAddOpen(false)}>Cancel</button>
          </div>
        </div>
      ) : (
        <button className="btn-add" onClick={()=>setAddOpen(true)}>+ Add business</button>
      )}
    </div>
  </div>

  {/* TOAST */}
  {toast && (
    <div className="toast" style={{
      background: toast.ok ? "#1a1810" : "#1a1010",
      border: `1px solid ${toast.ok?"#e8b84b33":"#9e5a5a33"}`,
      color: toast.ok ? "var(--gold)" : "#c07070"
    }}>{toast.msg}</div>
  )}
</div>


);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App/>);
</script>

</body>
</html>
