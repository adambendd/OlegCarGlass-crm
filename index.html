<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OlegCarGlass — CRM</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪟</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #080808; --s1: #0f0f0f; --s2: #161616;
  --b1: #1f1f1f; --b2: #2a2a2a;
  --gold: #e8b84b; --gold2: #f5cc6e; --goldd: #e8b84b15;
  --tx: #f2ede4; --tx2: #8a8278; --tx3: #3d3a35;
  --green: #5a9e72; --red: #9e5a5a;
  --fd: 'Syne',sans-serif; --fb: 'DM Sans',sans-serif;
}
,::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-30vh;left:-10vw;width:70vw;height:70vh;background:radial-gradient(ellipse,#e8b84b08 0%,transparent 70%);pointer-events:none;z-index:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:fadeUp .45s cubic-bezier(.16,1,.3,1) both}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}
input,textarea,select{
  width:100%;padding:12px 15px;background:var(--s2);border:1px solid var(--b1);
  border-radius:11px;color:var(--tx);font-size:14px;font-family:var(--fb);
  outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;
}
input:focus,textarea:focus,select:focus{border-color:#e8b84b55;box-shadow:0 0 0 3px #e8b84b0c}
input::placeholder,textarea::placeholder{color:var(--tx3)}
select option{background:var(--s2)}
textarea{resize:vertical;line-height:1.6}

/* NAV */
nav{
height:62px;border-bottom:1px solid var(–b1);display:flex;align-items:center;
padding:0 28px;gap:6px;background:#08080895;backdrop-filter:blur(20px);
position:sticky;top:0;z-index:100
}
.logo{display:flex;align-items:center;gap:11px;margin-right:14px}
.logo-icon{width:33px;height:33px;background:var(–gold);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 4px 16px #e8b84b25}
.logo-name{font-family:var(–fd);font-size:15px;font-weight:700;letter-spacing:-.3px}
.logo-sub{font-size:9px;color:var(–tx3);letter-spacing:1.5px;margin-top:1px}
.nav-date{margin-left:auto;font-size:12px;color:var(–tx3);font-weight:300}
.tab-btn{
background:none;border:none;cursor:pointer;font-family:var(–fb);font-size:13px;
font-weight:500;padding:7px 15px;color:var(–tx2);border-radius:9px;
transition:all .18s;position:relative
}
.tab-btn:hover{color:var(–tx);background:var(–s1)}
.tab-btn.on{color:var(–tx);background:var(–s2)}
.tab-btn.on::after{content:’’;position:absolute;bottom:-1px;left:14px;right:14px;height:1.5px;background:var(–gold);border-radius:2px}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 62px);position:relative;z-index:1}
.main{flex:1;padding:40px 44px 80px;min-width:0}
.sec-title{font-family:var(–fd);font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.sec-sub{font-size:13px;color:var(–tx3);margin-bottom:30px}

/* EMPTY */
.empty{border:1px dashed var(–b1);border-radius:18px;padding:80px 32px;text-align:center}
.empty-icon{font-size:36px;opacity:.15;margin-bottom:14px}
.empty-text{font-size:14px;color:var(–tx3)}

/* FORM */
.card{background:var(–s1);border:1px solid var(–b1);border-radius:18px;padding:26px;max-width:560px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.field{margin-bottom:16px}
.field.full{grid-column:span 2}
.flabel{font-size:11px;color:var(–tx2);letter-spacing:.6px;margin-bottom:7px;text-transform:uppercase;font-weight:500}

/* BUTTONS */
.btn-p{
background:var(–gold);color:#080808;border:none;padding:13px 24px;
border-radius:11px;font-weight:600;font-size:14px;cursor:pointer;
font-family:var(–fb);width:100%;transition:all .2s cubic-bezier(.16,1,.3,1);
position:relative;overflow:hidden
}
.btn-p:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 28px #e8b84b28;background:var(–gold2)}
.btn-p:disabled{opacity:.35;cursor:not-allowed}
.btn-g{
background:transparent;color:var(–tx2);border:1px solid var(–b1);
padding:10px 18px;border-radius:11px;font-size:13px;cursor:pointer;
font-family:var(–fb);transition:all .18s
}
.btn-g:hover{border-color:var(–b2);color:var(–tx)}
.btn-sm{padding:8px 18px;font-size:13px;border-radius:9px}
.btn-icon{background:none;border:none;color:var(–tx3);cursor:pointer;padding:5px 6px;border-radius:7px;font-size:13px;transition:all .15s;line-height:1}
.btn-icon:hover{color:var(–red);background:#9e5a5a12}
.btn-dash{
background:transparent;color:var(–tx3);border:1px dashed var(–b1);
padding:10px;border-radius:11px;font-size:13px;cursor:pointer;
font-family:var(–fb);width:100%;margin-top:8px;transition:all .18s
}
.btn-dash:hover{color:var(–gold);border-color:#e8b84b44;background:var(–goldd)}

/* BIZ BAR */
.biz-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(–s1);border:1px solid var(–b1);border-radius:14px;margin-bottom:22px;max-width:560px}
.biz-bar-av{width:34px;height:34px;background:#1e1c14;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px}
.biz-bar-name{font-size:14px;font-weight:600}
.biz-bar-email{font-size:12px;color:var(–tx3)}
.biz-bar-change{margin-left:auto;font-size:12px;color:var(–gold);background:none;border:none;cursor:pointer;font-family:var(–fb);padding:5px 10px;border-radius:7px;transition:background .15s}
.biz-bar-change:hover{background:var(–goldd)}

/* PREVIEW */
.preview{background:var(–s1);border:1px solid var(–b1);border-radius:18px;padding:24px;margin-top:20px;max-width:560px}
.preview-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(–b1)}
.preview-lbl{font-size:10px;color:var(–tx3);letter-spacing:1.2px;font-weight:600}
.preview-acts{display:flex;gap:8px}
.preview-body{font-family:var(–fb);font-size:13px;color:var(–tx2);line-height:1.85;white-space:pre-wrap}

/* SIDEBAR */
.sidebar{width:272px;border-left:1px solid var(–b1);background:#09090a;padding:28px 16px;height:calc(100vh - 62px);position:sticky;top:62px;overflow-y:auto;flex-shrink:0}
.sb-lbl{font-size:10px;color:var(–tx3);letter-spacing:1.4px;margin-bottom:12px;padding:0 4px;font-weight:600}
.biz-list{display:flex;flex-direction:column;gap:4px}
.biz-item{padding:11px 12px;border-radius:12px;border:1px solid transparent;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:9px}
.biz-item:hover{background:var(–s1);border-color:var(–b1)}
.biz-item.on{background:#1a1810;border-color:#e8b84b30}
.biz-av{width:30px;height:30px;border-radius:8px;background:var(–s2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:background .18s}
.biz-item.on .biz-av{background:#272010}
.biz-name{font-size:13px;font-weight:500;color:var(–tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;transition:color .18s}
.biz-item.on .biz-name{color:var(–tx)}
.biz-email{font-size:11px;color:var(–tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.add-form{margin-top:12px;background:var(–s1);border:1px solid var(–b1);border-radius:14px;padding:14px}
.add-form input{margin-bottom:8px;font-size:13px;padding:10px 13px;border-radius:9px}
.add-form input:last-of-type{margin-bottom:12px}
.add-acts{display:flex;gap:6px}

/* JOBS */
.job-row{display:flex;align-items:center;gap:13px;padding:14px 18px;background:var(–s1);border:1px solid var(–b1);border-radius:14px;margin-bottom:7px;max-width:560px;transition:border-color .18s}
.job-row:hover{border-color:var(–b2)}
.job-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.job-info{flex:1;min-width:0}
.job-n{font-size:14px;font-weight:500}
.job-m{font-size:11px;color:var(–tx3);margin-top:2px}
.badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500}
.job-amt{font-family:var(–fd);font-size:15px;font-weight:700}

/* STATS */
.stat-row{display:flex;gap:12px;margin-bottom:28px;max-width:560px}
.stat{flex:1;background:var(–s1);border:1px solid var(–b1);border-radius:16px;padding:18px 20px}
.stat-lbl{font-size:10px;color:var(–tx3);letter-spacing:1px;margin-bottom:10px;font-weight:600}
.stat-val{font-family:var(–fd);font-size:22px;font-weight:700}

/* SPINNER */
.spinner{display:inline-block;width:13px;height:13px;border:2px solid #08080835;border-top-color:#080808;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:12px;font-size:13px;font-weight:500;z-index:9999;white-space:nowrap;backdrop-filter:blur(20px);box-shadow:0 8px 40px #00000065;animation:fadeUp .3s cubic-bezier(.16,1,.3,1) both}
</style>

</head>
<body>
<div id="app"></div>

<script>
// ── DATA ──────────────────────────────────────────────
let state = {
  tab: 'receipt',
  businesses: [
    {id:1,name:'SafeLite AutoGlass',email:'orders@safelite.com',phone:'800-638-8958'},
    {id:2,name:'Harmon AutoGlass',email:'contact@harmonag.com',phone:'800-726-8464'},
    {id:3,name:'Novus Glass',email:'info@novusglass.com',phone:'800-944-7732'},
    {id:4,name:'Glass Doctor',email:'service@glassdoctor.com',phone:'800-913-9230'},
    {id:5,name:'National Windshield',email:'orders@nationalws.com',phone:'888-200-4100'},
  ],
  sel: null,
  form: {service:'',amount:'',date:'',notes:'',msg:''},
  preview: null,
  loading: false,
  jobs: [],
  jf: {service:'',amount:'',date:'',type:'income',status:'paid',bizId:''},
  addOpen: false,
  newB: {name:'',email:'',phone:''},
  toast: null,
};

function fmt(v){return '$'+Math.abs(Number(v)).toFixed(2);}
const today = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

// ── RENDER ────────────────────────────────────────────
function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    ${nav()}
    <div class="layout">
      <div class="main">${main()}</div>
      ${sidebar()}
    </div>
    ${state.toast ? <div class="toast" style="background:${state.toast.ok?'#1a1810':'#1a1010'};border:1px solid ${state.toast.ok?'#e8b84b33':'#9e5a5a33'};color:${state.toast.ok?'var(--gold)':'#c07070'}">${state.toast.msg}</div> : ''}
  `;
  bindEvents();
}

function nav(){
  return `
  <nav>
    <div class="logo">
      <div class="logo-icon">🪟</div>
      <div>
        <div class="logo-name">OlegCarGlass</div>
        <div class="logo-sub">AUTO GLASS CRM</div>
      </div>
    </div>
    ${['receipt','jobs','finances'].map((t,i)=>`
      <button class="tab-btn${state.tab===t?' on':''}" onclick="setTab('${t}')">${['Receipts','Jobs','Finances'][i]}</button>
    `).join('')}
    <span class="nav-date">${today}</span>
  </nav>`;
}

function main(){
  if(state.tab==='receipt') return receiptTab();
  if(state.tab==='jobs') return jobsTab();
  return financesTab();
}

function receiptTab(){
  const s = state.sel;
  return `
  <div class="fade">
    <div class="sec-title">Send a Receipt</div>
    <div class="sec-sub">${s?Ready to send to ${escHtml(s.name)}:'Select a business from the right panel to begin'}</div>
    ${!s ? `
      <div class="empty">
        <div class="empty-icon">✉️</div>
        <div class="empty-text">No business selected — pick one from the sidebar →</div>
      </div>
    ` : `
      <div class="biz-bar fade">
        <div class="biz-bar-av">🏢</div>
        <div>
          <div class="biz-bar-name">${escHtml(s.name)}</div>
          <div class="biz-bar-email">${escHtml(s.email||'')}</div>
        </div>
        <button class="biz-bar-change" onclick="clearSel()">Change</button>
      </div>
      <div class="card fade">
        <div class="fgrid">
          <div class="field full">
            <div class="flabel">Service / Work Done</div>
            <input id="f-service" value="${escAttr(state.form.service)}" placeholder="e.g. Windshield replacement" oninput="updateForm('service',this.value)"/>
          </div>
          <div class="field">
            <div class="flabel">Amount ($)</div>
            <input id="f-amount" type="number" value="${escAttr(state.form.amount)}" placeholder="0.00" oninput="updateForm('amount',this.value)"/>
          </div>
          <div class="field">
            <div class="flabel">Date</div>
            <input id="f-date" type="date" value="${escAttr(state.form.date)}" onchange="updateForm('date',this.value)"/>
          </div>
          <div class="field full">
            <div class="flabel">Job Notes (optional)</div>
            <textarea rows="2" placeholder="Part numbers, vehicle info…" oninput="updateForm('notes',this.value)">${escHtml(state.form.notes)}</textarea>


      </div>
      <div class="field full">
        <div class="flabel">Personal Message (optional)</div>
        <textarea rows="2" placeholder="e.g. Thanks for the ongoing work!" oninput="updateForm('msg',this.value)">${escHtml(state.form.msg)}</textarea>
      </div>
    </div>
    <button class="btn-p" onclick="generateReceipt()" ${state.loading?'disabled':''}>
      ${state.loading?'<span class="spinner"></span>Generating receipt…':'✦&nbsp;&nbsp;Generate Receipt with AI'}
    </button>
  </div>
  ${state.preview ? `
    <div class="preview fade">
      <div class="preview-hdr">
        <span class="preview-lbl">EMAIL PREVIEW</span>
        <div class="preview-acts">
          <button class="btn-g btn-sm" onclick="clearPreview()">Discard</button>
          <button class="btn-p btn-sm" style="width:auto" onclick="openMail()">Open in Mail →</button>
        </div>
      </div>
      <div class="preview-body">${escHtml(state.preview)}</div>
    </div>
  ` : ''}
`}


  </div>`;
}

function jobsTab(){
const j = state.jf;
return `

  <div class="fade">
    <div class="sec-title">Jobs</div>
    <div class="sec-sub">Log income and expenses</div>
    <div class="card" style="margin-bottom:22px">
      <div style="font-size:11px;color:var(--tx3);margin-bottom:16px;font-weight:600;letter-spacing:.5px">NEW ENTRY</div>
      <div class="fgrid">
        <div class="field full">
          <div class="flabel">Service / Description</div>
          <input value="${escAttr(j.service)}" placeholder="e.g. Windshield repair" oninput="updateJf('service',this.value)"/>
        </div>
        <div class="field">
          <div class="flabel">Amount ($)</div>
          <input type="number" value="${escAttr(j.amount)}" placeholder="0.00" oninput="updateJf('amount',this.value)"/>
        </div>
        <div class="field">
          <div class="flabel">Date</div>
          <input type="date" value="${escAttr(j.date)}" onchange="updateJf('date',this.value)"/>
        </div>
        <div class="field">
          <div class="flabel">Type</div>
          <select onchange="updateJf('type',this.value)">
            <option value="income" ${j.type==='income'?'selected':''}>Income</option>
            <option value="expense" ${j.type==='expense'?'selected':''}>Expense</option>
          </select>
        </div>
        <div class="field">
          <div class="flabel">Status</div>
          <select onchange="updateJf('status',this.value)">
            <option value="paid" ${j.status==='paid'?'selected':''}>Paid</option>
            <option value="pending" ${j.status==='pending'?'selected':''}>Pending</option>
          </select>
        </div>
        <div class="field full">
          <div class="flabel">Business</div>
          <select onchange="updateJf('bizId',this.value)">
            <option value="">— none —</option>
            ${state.businesses.map(b=><option value="${b.id}" ${j.bizId==b.id?'selected':''}>${escHtml(b.name)}</option>).join('')}
          </select>
        </div>
      </div>
      <button class="btn-p" onclick="saveJob()">Save Entry</button>
    </div>
    ${state.jobs.length===0
      ? <div class="empty"><div class="empty-icon">📋</div><div class="empty-text">No jobs logged yet.</div></div>
      : state.jobs.slice().reverse().map(j=>{
          const b=state.businesses.find(x=>x.id===parseInt(j.bizId));
          const inc=j.type==='income';
          return `
          <div class="job-row">
            <div class="job-dot" style="background:${inc?'var(--green)':'var(--red)'}"></div>
            <div class="job-info">
              <div class="job-n">${escHtml(j.service)}</div>
              <div class="job-m">${b?escHtml(b.name):'—'}${j.date?' · '+j.date:''}</div>
            </div>
            <span class="badge" style="background:${j.status==='paid'?'#5a9e7218':'#e8b84b18'};color:${j.status==='paid'?'var(--green)':'var(--gold)'}">${j.status}</span>
            <div class="job-amt" style="color:${inc?'var(--green)':'var(--red)'}">${inc?'+':'−'}${fmt(j.amount)}</div>
            <button class="btn-icon" onclick="deleteJob(${j.id})">✕</button>
          </div>`;
        }).join('')
    }
  </div>`;
}

function financesTab(){
const inc = state.jobs.filter(j=>j.type===‘income’).reduce((s,j)=>s+j.amount,0);
const exp = state.jobs.filter(j=>j.type===‘expense’).reduce((s,j)=>s+j.amount,0);
const profit = inc-exp;
return `

  <div class="fade">
    <div class="sec-title">Finances</div>
    <div class="sec-sub">Your income and expense overview</div>
    ${state.jobs.length===0
      ? <div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Log jobs first — your financial summary appears here.</div></div>
      : `
        <div class="stat-row">
          <div class="stat"><div class="stat-lbl">INCOME</div><div class="stat-val" style="color:var(--green)">${fmt(inc)}</div></div>
          <div class="stat"><div class="stat-lbl">EXPENSES</div><div class="stat-val" style="color:var(--red)">${fmt(exp)}</div></div>
          <div class="stat"><div class="stat-lbl">NET PROFIT</div><div class="stat-val" style="color:${profit>=0?'var(--gold)':'var(--red)'}">${fmt(profit)}</div></div>
        </div>
        ${state.jobs.slice().reverse().map(j=>`
          <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--s1);border:1px solid var(--b1);border-radius:12px;margin-bottom:6px;max-width:560px">
            <div style="width:5px;height:5px;border-radius:50%;background:${j.type==='income'?'var(--green)':'var(--red)'};flex-shrink:0"></div>
            <div style="flex:1;font-size:13px;font-weight:500">${escHtml(j.service)}</div>
            <div style="font-size:11px;color:var(--tx3)">${j.date||''}</div>
            <div style="font-family:var(--fd);font-size:14px;font-weight:700;color:${j.type==='income'?'var(--green)':'var(--red)'}">${j.type==='income'?'+':'−'}${fmt(j.amount)}</div>
          </div>
        `).join('')}
      `
    }
  </div>`;
}

function sidebar(){
return `

  <div class="sidebar">
    <div class="sb-lbl">YOUR BUSINESSES</div>
    <div class="biz-list">
      ${state.businesses.map(b=>`
        <div class="biz-item${state.sel?.id===b.id?' on':''}" onclick="pickBiz(${b.id})">
          <div class="biz-av">🏢</div>
          <div style="overflow:hidden;flex:1">
            <div class="biz-name">${escHtml(b.name)}</div>
            <div class="biz-email">${escHtml(b.email||'')}</div>
          </div>
          <button class="btn-icon" onclick="event.stopPropagation();deleteBiz(${b.id})">✕</button>
        </div>
      `).join('')}
    </div>
    ${state.addOpen ? `
      <div class="add-form">
        <input placeholder="Business name *" value="${escAttr(state.newB.name)}" oninput="updateNewB('name',this.value)"/>
        <input placeholder="Email address" value="${escAttr(state.newB.email)}" oninput="updateNewB('email',this.value)"/>
        <input placeholder="Phone (optional)" value="${escAttr(state.newB.phone)}" oninput="updateNewB('phone',this.value)"/>
        <div class="add-acts">
          <button class="btn-p" style="padding:9px;font-size:13px" onclick="saveBiz()">Save</button>
          <button class="btn-g" style="flex:1;font-size:12px;padding:8px" onclick="closeAdd()">Cancel</button>
        </div>
      </div>
    ` : <button class="btn-dash" onclick="openAdd()">+ Add business</button>}
  </div>`;
}

// ── HELPERS ───────────────────────────────────────────
function escHtml(s){return String(s||’’).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’)}
function escAttr(s){return String(s||’’).replace(/”/g,’"’)}

function ping(msg,ok=true){
state.toast={msg,ok};
render();
setTimeout(()=>{state.toast=null;render();},3000);
}

// ── ACTIONS ───────────────────────────────────────────
function setTab(t){state.tab=t;render()}
function clearSel(){state.sel=null;state.preview=null;render()}
function clearPreview(){state.preview=null;render()}
function openAdd(){state.addOpen=true;render()}
function closeAdd(){state.addOpen=false;render()}

function updateForm(k,v){state.form[k]=v}
function updateJf(k,v){state.jf[k]=v}
function updateNewB(k,v){state.newB[k]=v}

function pickBiz(id){
state.sel=state.businesses.find(b=>b.id===id)||null;
state.preview=null;
state.tab=‘receipt’;
render();
}

function deleteBiz(id){
if(state.sel?.id===id) state.sel=null;
state.businesses=state.businesses.filter(b=>b.id!==id);
render();
}

function saveBiz(){
if(!state.newB.name.trim()) return ping(‘Name is required’,false);
state.businesses.push({…state.newB,id:Date.now()});
const name=state.newB.name;
state.newB={name:’’,email:’’,phone:’’};
state.addOpen=false;
ping(name+’ added’);
}

function saveJob(){
if(!state.jf.service.trim()||!state.jf.amount) return ping(‘Fill in service and amount’,false);
state.jobs.push({…state.jf,id:Date.now(),amount:parseFloat(state.jf.amount)});
state.jf={service:’’,amount:’’,date:’’,type:‘income’,status:‘paid’,bizId:’’};
ping(‘Job saved’);
}

function deleteJob(id){
state.jobs=state.jobs.filter(j=>j.id!==id);
render();
}

async function generateReceipt(){
const s=state.sel, f=state.form;
if(!s) return ping(‘Select a business first’,false);
if(!f.service.trim()||!f.amount) return ping(‘Service and amount required’,false);
state.loading=true; state.preview=null; render();
try{
const res=await fetch(‘https://api.anthropic.com/v1/messages’,{
method:‘POST’,
headers:{‘Content-Type’:‘application/json’},
body:JSON.stringify({
model:‘claude-sonnet-4-20250514’,max_tokens:900,
messages:[{role:‘user’,content:Write a professional, warm, concise email receipt from OlegCarGlass auto glass repair shop.\nTo: ${s.name} (${s.email})\nService: ${f.service}\nAmount: $${f.amount}\nDate: ${f.date||'today'}\nNotes: ${f.notes||'none'}\nMessage: ${f.msg||'none'}\n\nFirst line must be "Subject: [subject]", blank line, then body. Sign as: Oleg — OlegCarGlass}]
})
});
const d=await res.json();
if(d.error) return ping(‘Error: ‘+d.error.message,false);
state.preview=(d.content||[]).map(b=>b.text||’’).join(’\n’);
}catch(e){ping(‘Connection error. Try again.’,false);}
state.loading=false; render();
}

function openMail(){
if(!state.preview||!state.sel) return;
const lines=state.preview.split(’\n’);
const sub=(lines.find(l=>/^subject:/i.test(l.trim()))||’’).replace(/^subject:\s*/i,’’).trim();
const body=lines.filter(l=>!/^subject:/i.test(l.trim())).join(’\n’).trim();
window.open(mailto:${state.sel.email}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)});
ping(‘Email client opened ✓’);
}

// ── BIND ──────────────────────────────────────────────
function bindEvents(){
// All events are inline onclick for simplicity — nothing extra needed
}

// ── INIT ──────────────────────────────────────────────
render();
</script>
